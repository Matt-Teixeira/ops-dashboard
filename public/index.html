<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ops-dashboard</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body { font: 14px/1.4 system-ui, sans-serif; margin: 0; padding: 1.5rem; }
    h1 { font-size: 1.2rem; margin: 0 0 .25rem; }
    .muted { color: #888; font-size: .8rem; }
    section { margin-top: 1.5rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { text-align: left; padding: .35rem .6rem; border-bottom: 1px solid #8883; white-space: nowrap; }
    th { font-size: .72rem; text-transform: uppercase; letter-spacing: .03em; color: #888; }
    .badge { display: inline-block; padding: .05rem .45rem; border-radius: .7rem; font-size: .72rem; font-weight: 600; color: #fff; }
    .SUCCESS { background: #2e7d32; }
    .WARN    { background: #ed6c02; }
    .ERROR   { background: #c62828; }
    .INFO    { background: #607d8b; }
    .stale   { background: #6a1b9a; }
    .unknown { background: #9e9e9e; }
    .err-msg { white-space: pre-wrap; max-width: 60ch; color: #c62828; font-family: ui-monospace, monospace; font-size: .76rem; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    button { font: inherit; padding: .2rem .6rem; cursor: pointer; }
    a { color: inherit; }
    /* Error-feed rows link into the run drill-down. */
    tr.clickable { cursor: pointer; }
    tr.clickable:hover { background: #8881; }
    /* WARN/ERROR rows stand out in the run timeline. */
    tr.row-WARN  { background: #ed6c0218; }
    tr.row-ERROR { background: #c6282818; }
    td.detail { white-space: pre-wrap; max-width: 50ch; font-family: ui-monospace, monospace; font-size: .76rem; color: #888; }
    .run-meta { display: grid; grid-template-columns: max-content 1fr; gap: .15rem .8rem; font-size: .82rem; margin: .5rem 0 1rem; }
    .run-meta dt { color: #888; }
    .run-meta dd { margin: 0; font-variant-numeric: tabular-nums; }
    .run-msg { margin: 1rem 0; font-size: .9rem; }
    .cap-note { margin: .8rem 0; }
    /* Grid controls + grouping/sorting (Phase 8). */
    .controls { display: flex; gap: .8rem; align-items: center; margin: .4rem 0 .6rem; font-size: .8rem; color: #888; }
    .controls select { font: inherit; }
    th[data-sort-key] { cursor: pointer; user-select: none; }
    th[data-sort-key]:hover { color: #aaa; }
    th .sort-ind { margin-left: .25rem; font-size: .7rem; }
    tr.group-head { cursor: pointer; }
    tr.group-head:hover td { background: #8882; }
    tr.group-head td { background: #8881; font-weight: 600; }
    tr.group-head .disclosure { display: inline-block; width: 1em; color: #888; }
    tr.group-head .grp-count { color: #888; font-weight: 400; margin-left: .4rem; }
    tr.group-head .badge { margin-left: .5rem; }
    /* Filters, status chips, summary + refresh (Phase 9). */
    .controls input[type="search"] { font: inherit; padding: .15rem .45rem; min-width: 18ch; }
    .controls .spacer { flex: 1; }
    .chips { display: inline-flex; gap: .3rem; flex-wrap: wrap; }
    .chip { font: inherit; cursor: pointer; border: 0; opacity: .45; }
    .chip.active { opacity: 1; box-shadow: 0 0 0 2px #fff6; }
    #updated { font-variant-numeric: tabular-nums; }
    .controls label { display: inline-flex; align-items: center; gap: .3rem; }
  </style>
</head>
<body>
  <h1>ops-dashboard <span class="muted" id="meta"></span></h1>
  <div class="muted">read-only view of <code>util.app_run_logs</code> &middot; <button id="refresh">refresh</button></div>

  <!-- Dashboard view: job grid + error feed. Hidden while a run drill-down is open. -->
  <div id="dashboard">
    <section>
      <h2 style="font-size:.95rem">Job grid</h2>
      <div class="controls">
        <input id="grid-search" type="search" placeholder="filter app / job / run id" autocomplete="off" aria-label="filter the grid" />
        <label>Group by
          <select id="group-by">
            <option value="app">App</option>
            <option value="job">Job</option>
            <option value="none">None</option>
          </select>
        </label>
        <span id="status-chips" class="chips" role="group" aria-label="filter by status"></span>
        <span class="spacer"></span>
        <span class="muted" id="updated"></span>
        <label class="muted"><input type="checkbox" id="autorefresh" checked /> auto-refresh</label>
      </div>
      <table id="grid"><thead><tr>
        <th data-sort-key="app">App</th><th data-sort-key="job">Job</th>
        <th data-sort-key="status">Status</th><th data-sort-key="lastRun">Last run</th>
        <th data-sort-key="age">Age</th><th data-sort-key="duration">Duration</th>
        <th data-sort-key="issues">Issues</th><th>Run id</th>
      </tr></thead><tbody></tbody></table>
    </section>

    <section>
      <h2 style="font-size:.95rem">Error feed <span class="muted">(recent WARN/ERROR &middot; click a row for the run)</span></h2>
      <table id="errors"><thead><tr>
        <th>When</th><th>App</th><th>Type</th><th>Func</th><th>Message</th>
      </tr></thead><tbody></tbody></table>
    </section>
  </div>

  <!-- Run drill-down view: one run's event timeline. Populated by showRun(). -->
  <section id="run-view" hidden></section>

  <!-- Pure grid transforms (sort/group/roll-up); exposes window.GridView. -->
  <script src="grid-view.js"></script>
  <script>
    const fmtAge = (ms) => {
      if (ms == null) return "—";
      const s = Math.round(ms / 1000);
      if (s < 90) return s + "s";
      const m = Math.round(s / 60);
      if (m < 90) return m + "m";
      return Math.round(m / 60) + "h";
    };
    const fmtDur = (ms) => (ms == null ? "—" : ms < 1000 ? ms + "ms" : (ms / 1000).toFixed(1) + "s");
    const fmtTime = (iso) => (iso ? new Date(iso).toLocaleString() : "—");
    const cell = (text, cls) => { const td = document.createElement("td"); if (cls) td.className = cls; td.textContent = text; return td; };

    // --- job grid: fetch once, render from memory on every control change -----
    // Rendering is decoupled from fetch: changing the group-by, a column sort, or
    // a group's collapsed state re-renders gridData with no network request. The
    // view state is persisted so a refresh keeps the operator's layout. (Phase 8)

    const GRID_COLS = 8;
    const GRID_VIEW_KEY = "ops-grid-view";
    const GROUP_OPTS = ["app", "job", "none"];
    const SORT_KEYS = ["app", "job", "status", "lastRun", "age", "duration", "issues"];
    const STATUS_TOKENS = ["ERROR", "WARN", "SUCCESS", "STALE"]; // clickable status chips
    // The in-process grid cache only changes every GRID_REFRESH_MS (server default
    // 120s), so auto-refresh polls no faster than that -- anything quicker is wasted.
    const AUTO_REFRESH_MS = 120000;
    let gridData = null; // last /api/jobs/latest payload
    const gridView = loadGridView();

    function loadGridView() {
      const def = { groupBy: "app", sortKey: "lastRun", sortDir: "desc", search: "" };
      try {
        const s = JSON.parse(localStorage.getItem(GRID_VIEW_KEY) || "{}");
        return {
          groupBy: GROUP_OPTS.includes(s.groupBy) ? s.groupBy : def.groupBy,
          sortKey: SORT_KEYS.includes(s.sortKey) ? s.sortKey : def.sortKey,
          sortDir: s.sortDir === "asc" || s.sortDir === "desc" ? s.sortDir : def.sortDir,
          search: typeof s.search === "string" ? s.search : "",
          statuses: new Set((Array.isArray(s.statuses) ? s.statuses : []).filter((t) => STATUS_TOKENS.includes(t))),
          collapsed: new Set(Array.isArray(s.collapsed) ? s.collapsed : []),
        };
      } catch {
        return { ...def, statuses: new Set(), collapsed: new Set() };
      }
    }

    function saveGridView() {
      try {
        localStorage.setItem(GRID_VIEW_KEY, JSON.stringify({
          groupBy: gridView.groupBy,
          sortKey: gridView.sortKey,
          sortDir: gridView.sortDir,
          search: gridView.search,
          statuses: Array.from(gridView.statuses),
          collapsed: Array.from(gridView.collapsed),
        }));
      } catch { /* storage unavailable -> view state stays in memory only */ }
    }

    async function loadGrid() {
      const res = await fetch("/api/jobs/latest");
      const r = await res.json();
      if (res.status === 503) {
        document.getElementById("meta").textContent = "· warming up, retrying…";
        setTimeout(loadGrid, 3000);
        return;
      }
      gridData = r;
      renderGrid(); // builds the summary header + chips from gridData
    }

    // Status cell with the run-status badge plus the STALE / "? CADENCE" markers.
    function jobStatusCell(j) {
      const st = cell("");
      const badge = document.createElement("span");
      badge.className = "badge " + j.status;
      badge.textContent = j.status;
      st.appendChild(badge);
      if (j.stale) { const s = document.createElement("span"); s.className = "badge stale"; s.textContent = "STALE"; s.style.marginLeft = ".3rem"; st.appendChild(s); }
      // stale === null: no configured cadence. Mark it so an unknown job is never
      // mistaken for a healthy one (its run-status badge alone could read "green").
      else if (j.stale === null) { const u = document.createElement("span"); u.className = "badge unknown"; u.textContent = "? CADENCE"; u.title = "no configured cadence — staleness unknown"; u.style.marginLeft = ".3rem"; st.appendChild(u); }
      return st;
    }

    function jobRow(j) {
      const tr = document.createElement("tr");
      tr.appendChild(cell(j.app));
      tr.appendChild(cell(j.job));
      tr.appendChild(jobStatusCell(j));
      tr.appendChild(cell(fmtTime(j.lastRun)));
      tr.appendChild(cell(fmtAge(j.ageMs), "num"));
      tr.appendChild(cell(fmtDur(j.durationMs), "num"));
      tr.appendChild(cell(j.issueCount, "num"));
      const idCell = document.createElement("td");
      const link = document.createElement("a");
      // Open the drill-down view, passing inserted_at as the hint (`at`) so the
      // run query prunes to one partition.
      link.href = runHref(j.runId, j.lastRun);
      link.textContent = j.runId;
      idCell.appendChild(link);
      tr.appendChild(idCell);
      return tr;
    }

    // A collapsible group header: disclosure glyph, label, row count, and a
    // roll-up badge = the worst status in the group.
    function groupHeadRow(group) {
      const collapsed = gridView.collapsed.has(group.key);
      const tr = document.createElement("tr");
      tr.className = "group-head";
      tr.tabIndex = 0;
      tr.setAttribute("role", "button");
      tr.setAttribute("aria-expanded", String(!collapsed));
      const td = document.createElement("td");
      td.colSpan = GRID_COLS;
      const disc = document.createElement("span");
      disc.className = "disclosure";
      disc.textContent = collapsed ? "▸" : "▾";
      td.appendChild(disc);
      td.appendChild(document.createTextNode(group.key));
      const cnt = document.createElement("span");
      cnt.className = "grp-count";
      cnt.textContent = "(" + group.rows.length + ")";
      td.appendChild(cnt);
      const status = GridView.groupRollupStatus(group.rows);
      const b = document.createElement("span");
      b.className = "badge " + status;
      b.textContent = status;
      td.appendChild(b);
      tr.appendChild(td);
      const toggle = () => {
        if (gridView.collapsed.has(group.key)) gridView.collapsed.delete(group.key);
        else gridView.collapsed.add(group.key);
        saveGridView();
        renderGrid();
      };
      tr.addEventListener("click", toggle);
      tr.addEventListener("keydown", (ev) => { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); toggle(); } });
      return tr;
    }

    function renderGrid() {
      if (!gridData) return;
      updateSortIndicators();
      // Pipeline: filter -> sort -> group (filtering must precede grouping).
      const visible = GridView.filterJobs(gridData.jobs || [], { search: gridView.search, statuses: gridView.statuses });
      renderSummary(visible.length);
      const tb = document.querySelector("#grid tbody");
      tb.innerHTML = "";
      const sorted = GridView.sortJobs(visible, gridView.sortKey, gridView.sortDir);
      const groups = GridView.groupJobs(sorted, gridView.groupBy);
      const grouped = gridView.groupBy === "app" || gridView.groupBy === "job";
      const frag = document.createDocumentFragment();
      for (const g of groups) {
        if (grouped) {
          frag.appendChild(groupHeadRow(g));
          if (gridView.collapsed.has(g.key)) continue; // collapsed -> hide member rows
        }
        for (const j of g.rows) frag.appendChild(jobRow(j));
      }
      tb.appendChild(frag);
    }

    // Summary header + status chips. Counts are over the WHOLE grid (gridData.jobs)
    // so the chips are a stable overview; the filtered count is shown as "showing N".
    function renderSummary(visibleCount) {
      const r = gridData;
      const s = GridView.summarize(r.jobs || []);
      const asOfTime = r.asOf ? new Date(r.asOf).toLocaleTimeString() : "—";
      const unknownCadence = s.unknown ? ` · ${s.unknown} cadence unknown` : "";
      const filtering = !!gridView.search || gridView.statuses.size > 0;
      const showing = filtering ? ` · showing ${visibleCount}` : "";
      document.getElementById("meta").textContent =
        `· ${r.count} jobs · last ${r.lookbackDays}d · as of ${asOfTime}` + unknownCadence + showing + (r.stale ? ` · ⚠ ${r.stale}` : "");
      renderChips(s);
      updateUpdatedLabel();
    }

    // token -> badge css class (STALE reuses the purple stale badge).
    const CHIP_CLASS = { ERROR: "ERROR", WARN: "WARN", SUCCESS: "SUCCESS", STALE: "stale" };

    function renderChips(summary) {
      const box = document.getElementById("status-chips");
      box.replaceChildren();
      for (const token of STATUS_TOKENS) {
        const count = token === "STALE" ? summary.stale : summary[token];
        const active = gridView.statuses.has(token);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "chip badge " + CHIP_CLASS[token] + (active ? " active" : "");
        btn.textContent = token + " " + count;
        btn.setAttribute("aria-pressed", String(active));
        btn.addEventListener("click", () => {
          if (gridView.statuses.has(token)) gridView.statuses.delete(token);
          else gridView.statuses.add(token);
          saveGridView();
          renderGrid();
        });
        box.appendChild(btn);
      }
    }

    // "updated Ns ago", derived from gridData.asOf; ticks on its own interval.
    function updateUpdatedLabel() {
      const el = document.getElementById("updated");
      if (!el) return;
      if (!gridData || !gridData.asOf) { el.textContent = ""; return; }
      el.textContent = "updated " + fmtAge(Date.now() - new Date(gridData.asOf).getTime()) + " ago";
    }

    function updateSortIndicators() {
      document.querySelectorAll("#grid thead th[data-sort-key]").forEach((th) => {
        let ind = th.querySelector(".sort-ind");
        if (th.dataset.sortKey === gridView.sortKey) {
          if (!ind) { ind = document.createElement("span"); ind.className = "sort-ind"; th.appendChild(ind); }
          ind.textContent = gridView.sortDir === "asc" ? "▲" : "▼";
          th.setAttribute("aria-sort", gridView.sortDir === "asc" ? "ascending" : "descending");
        } else {
          if (ind) ind.remove();
          th.removeAttribute("aria-sort");
        }
      });
    }

    // First click on a column picks a sensible default direction; text sorts and
    // worst-first status read more naturally ascending, magnitudes descending.
    function defaultDir(key) {
      return (key === "app" || key === "job" || key === "status") ? "asc" : "desc";
    }

    // Auto-refresh: poll refresh() on an interval, but only while the dashboard is
    // visible (not in a drill-down). Re-render keeps the current view state, so the
    // operator's sort/group/filter/collapse survive each refresh.
    let autoRefreshTimer = null;
    function setAutoRefresh(on) {
      if (autoRefreshTimer) { clearInterval(autoRefreshTimer); autoRefreshTimer = null; }
      if (on) autoRefreshTimer = setInterval(() => {
        if (!document.getElementById("dashboard").hidden) refresh();
      }, AUTO_REFRESH_MS);
    }

    function initGridControls() {
      const sel = document.getElementById("group-by");
      sel.value = gridView.groupBy;
      sel.addEventListener("change", () => { gridView.groupBy = sel.value; saveGridView(); renderGrid(); });

      // Free-text filter, debounced so each keystroke doesn't re-render.
      const search = document.getElementById("grid-search");
      search.value = gridView.search;
      let searchTimer = null;
      search.addEventListener("input", () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(() => { gridView.search = search.value.trim(); saveGridView(); renderGrid(); }, 150);
      });

      // Last-updated label ticks independently of fetches; auto-refresh toggle.
      setInterval(updateUpdatedLabel, 5000);
      const auto = document.getElementById("autorefresh");
      auto.addEventListener("change", () => setAutoRefresh(auto.checked));
      setAutoRefresh(auto.checked);

      document.querySelectorAll("#grid thead th[data-sort-key]").forEach((th) => {
        th.tabIndex = 0;
        th.setAttribute("role", "button");
        const key = th.dataset.sortKey;
        const apply = () => {
          if (gridView.sortKey === key) gridView.sortDir = gridView.sortDir === "asc" ? "desc" : "asc";
          else { gridView.sortKey = key; gridView.sortDir = defaultDir(key); }
          saveGridView();
          renderGrid();
        };
        th.addEventListener("click", apply);
        th.addEventListener("keydown", (ev) => { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); apply(); } });
      });
    }

    async function loadErrors() {
      const r = await fetch("/api/errors?limit=100").then((x) => x.json());
      const tb = document.querySelector("#errors tbody");
      tb.innerHTML = "";
      for (const e of r.events) {
        const tr = document.createElement("tr");
        // Link to the run drill-down, using the event dt as the hint. The hinted
        // run query matches inserted_at within ±1h, and a run's events are within
        // minutes of its inserted_at, so dt prunes to the right partition.
        if (e.run_id) {
          tr.className = "clickable";
          tr.tabIndex = 0;
          tr.setAttribute("role", "link");
          const go = () => { location.hash = runHash(e.run_id, e.dt); };
          tr.addEventListener("click", go);
          tr.addEventListener("keydown", (ev) => {
            if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); go(); }
          });
        }
        tr.appendChild(cell(fmtTime(e.dt)));
        tr.appendChild(cell(e.app_name));
        const ty = cell(""); const b = document.createElement("span"); b.className = "badge " + e.type; b.textContent = e.type; ty.appendChild(b); tr.appendChild(ty);
        tr.appendChild(cell(e.func || "—"));
        tr.appendChild(cell(e.err_msg || (e.note ? JSON.stringify(e.note) : "—"), "err-msg"));
        tb.appendChild(tr);
      }
    }

    // --- drill-down: hash route + run timeline -------------------------------

    // Hash links carry the run id and a partition-pruning hint (`at`): the grid
    // passes the row's inserted_at, the error feed passes the event dt. Both are
    // sent to the API as ?inserted_at=<at>.
    const runHash = (id, hint) => "run=" + encodeURIComponent(id) + (hint ? "&at=" + encodeURIComponent(hint) : "");
    const runHref = (id, hint) => "#" + runHash(id, hint);

    const RENDER_CAP = 500; // worst-case data_acquisition runs carry ~1600 events

    let dashboardLoaded = false;

    async function refresh() {
      try { await Promise.all([loadGrid(), loadErrors()]); dashboardLoaded = true; }
      catch (err) { document.getElementById("meta").textContent = "· error: " + err.message; }
    }

    function backLink() {
      const a = document.createElement("a");
      a.href = "#"; a.textContent = "← back"; a.className = "muted";
      return a;
    }

    // Run status from the timeline, matching the suite rule (ERROR > WARN > SUCCESS).
    function runStatus(events) {
      let warn = false;
      for (const e of events) {
        if (e && e.type === "ERROR") return "ERROR";
        if (e && e.type === "WARN") warn = true;
      }
      return warn ? "WARN" : "SUCCESS";
    }

    // Compact, text-only rendering of an event's `note` object: surface the ids
    // operators look for, then the full note as JSON. Never interpreted as HTML.
    function noteText(note) {
      if (note == null) return "";
      if (typeof note !== "object") return String(note);
      const id = note.system_id || note.sme;
      const head = [id && ("system: " + id), note.job_id && ("job: " + note.job_id)].filter(Boolean).join("  ");
      const json = JSON.stringify(note);
      return head ? head + "\n" + json : json;
    }

    const TYPE_CLASS = { INFO: "INFO", WARN: "WARN", ERROR: "ERROR" };

    function eventRow(e) {
      const tr = document.createElement("tr");
      const type = e && e.type;
      if (type === "WARN" || type === "ERROR") tr.className = "row-" + type;
      tr.appendChild(cell(fmtTime(e && e.dt)));
      const ty = cell("");
      if (type) {
        const b = document.createElement("span");
        b.className = "badge " + (TYPE_CLASS[type] || "INFO"); // unknown types: neutral badge, real text
        b.textContent = type;
        ty.appendChild(b);
      } else { ty.textContent = "—"; }
      tr.appendChild(ty);
      tr.appendChild(cell((e && e.func) || "—"));
      tr.appendChild(cell((e && e.tag) || "—"));
      tr.appendChild(cell(noteText(e && e.note), "detail"));
      tr.appendChild(cell((e && e.err_msg) || "", "err-msg"));
      return tr;
    }

    function renderRunMessage(view, msg) {
      view.replaceChildren();
      view.appendChild(backLink());
      const p = document.createElement("p");
      p.className = "run-msg";
      p.textContent = msg;
      view.appendChild(p);
    }

    function renderRun(view, data) {
      view.replaceChildren();
      const events = Array.isArray(data.events) ? data.events : [];

      view.appendChild(backLink());

      const h2 = document.createElement("h2");
      h2.style.fontSize = ".95rem";
      h2.style.margin = ".4rem 0 .2rem";
      h2.textContent = (data.app || "?") + " / " + (data.job || "?") + " ";
      const status = runStatus(events);
      const badge = document.createElement("span");
      badge.className = "badge " + status;
      badge.textContent = status;
      h2.appendChild(badge);
      view.appendChild(h2);

      const meta = document.createElement("dl");
      meta.className = "run-meta";
      const addMeta = (k, v) => {
        const dt = document.createElement("dt"); dt.textContent = k;
        const dd = document.createElement("dd"); dd.textContent = v;
        meta.appendChild(dt); meta.appendChild(dd);
      };
      addMeta("Run id", data.runId || "—");
      addMeta("Inserted at", fmtTime(data.insertedAt));
      addMeta("Started", fmtTime(data.startedAt));
      addMeta("Ended", fmtTime(data.endedAt));
      addMeta("Duration", fmtDur(data.durationMs));
      addMeta("Events", String(events.length));
      view.appendChild(meta);

      if (!events.length) {
        const p = document.createElement("p");
        p.className = "muted";
        p.textContent = "No events recorded for this run.";
        view.appendChild(p);
        return;
      }

      const table = document.createElement("table");
      const thead = document.createElement("thead");
      const htr = document.createElement("tr");
      for (const h of ["When", "Type", "Func", "Tag", "Detail", "Message"]) {
        const th = document.createElement("th"); th.textContent = h; htr.appendChild(th);
      }
      thead.appendChild(htr); table.appendChild(thead);
      const tb = document.createElement("tbody");
      table.appendChild(tb);
      view.appendChild(table);

      // Render in one fragment pass; cap the initial render so a huge run stays
      // responsive, with a button to reveal the rest on demand.
      const appendRows = (from, to) => {
        const frag = document.createDocumentFragment();
        for (let i = from; i < to; i++) frag.appendChild(eventRow(events[i]));
        tb.appendChild(frag);
      };
      appendRows(0, Math.min(events.length, RENDER_CAP));

      if (events.length > RENDER_CAP) {
        const note = document.createElement("div");
        note.className = "cap-note muted";
        const label = document.createElement("span");
        label.textContent = "Showing " + RENDER_CAP + " of " + events.length + " events. ";
        const btn = document.createElement("button");
        btn.textContent = "show all " + events.length;
        btn.addEventListener("click", () => { appendRows(RENDER_CAP, events.length); note.remove(); });
        note.appendChild(label); note.appendChild(btn);
        view.appendChild(note);
      }
    }

    // Monotonic token: every navigation (showRun or showDashboard) bumps it, so a
    // slower in-flight run fetch that resolves after the user moved on is ignored
    // instead of rendering into a stale or hidden view.
    let runReq = 0;

    async function showRun(runId, hint) {
      const myReq = ++runReq;
      document.getElementById("dashboard").hidden = true;
      const view = document.getElementById("run-view");
      view.hidden = false;
      window.scrollTo(0, 0);
      renderRunMessage(view, "Loading run…");

      let res;
      const url = "/api/runs/" + encodeURIComponent(runId) + (hint ? "?inserted_at=" + encodeURIComponent(hint) : "");
      try { res = await fetch(url); }
      catch { if (myReq === runReq) renderRunMessage(view, "Couldn't load this run."); return; }
      if (myReq !== runReq) return; // superseded by a newer navigation

      if (res.status === 400) return renderRunMessage(view, "Invalid run id.");
      if (res.status === 404) return renderRunMessage(view, "Run not found, or the timestamp hint no longer matches this run.");
      if (!res.ok) return renderRunMessage(view, "Couldn't load this run.");

      let data;
      try { data = await res.json(); }
      catch { if (myReq === runReq) renderRunMessage(view, "Couldn't load this run."); return; }
      if (myReq !== runReq) return;
      renderRun(view, data);
    }

    function showDashboard() {
      runReq++; // invalidate any in-flight run fetch so it can't render after we leave
      document.getElementById("run-view").hidden = true;
      document.getElementById("dashboard").hidden = false;
      if (!dashboardLoaded) refresh();
    }

    function route() {
      const hash = location.hash.slice(1);
      if (hash.startsWith("run=")) {
        const p = new URLSearchParams(hash);
        showRun(p.get("run"), p.get("at"));
      } else {
        showDashboard();
      }
    }

    document.getElementById("refresh").addEventListener("click", refresh);
    window.addEventListener("hashchange", route);
    initGridControls();
    route();
  </script>
</body>
</html>
